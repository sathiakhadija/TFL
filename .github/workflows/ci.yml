name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.4.10
      - name: Run ruff
        run: >
          ruff check ingestion/ dags/ tests/
          --ignore E501

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt requests psycopg2-binary python-dotenv
      - name: Run tests
        run: pytest tests/ -v
        env:
          TFL_API_KEY: dummy-key-for-ci
          TFL_APP_ID: dummy-app-id
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: tfl_pipeline
          POSTGRES_USER: tfl_user
          POSTGRES_PASSWORD: tfl_password
